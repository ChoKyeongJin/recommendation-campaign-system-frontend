services:
  frontend:
    image: chokyeongjin/recommendation-campaign-system-frontend:latest
    container_name: rcs-frontend
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_TELEMETRY_DISABLED: "1"
      PYTHON_PROMPT_API_BASE: "http://host.docker.internal:8000"
      PYTHON_TARGET_SQL_URL: "http://host.docker.internal:8000/target-sql"
      PYTHON_CHANNEL_MESSAGES_URL: "http://host.docker.internal:8000/channel-messages"
      PYTHON_CAMPAIGN_EXPERIMENTS_RUN_URL: "http://host.docker.internal:8000/campaign-experiments/run"
      PYTHON_CTR_SCORE_URL: "http://host.docker.internal:8000/ai/ctr/score"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
